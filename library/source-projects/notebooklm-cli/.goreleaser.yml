version: 2

project_name: nlm

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - main: .
    binary: nlm
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/Dokkabei97/notebooklm-cli/cmd.Version={{.Version}}
      - -X github.com/Dokkabei97/notebooklm-cli/cmd.CommitSHA={{.ShortCommit}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

homebrew_casks:
  - name: nlm
    binaries:
      - nlm
    homepage: "https://github.com/Dokkabei97/notebooklm-cli"
    description: "Unofficial CLI client for Google NotebookLM"
    repository:
      owner: Dokkabei97
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"

release:
  github:
    owner: Dokkabei97
    name: notebooklm-cli
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"
